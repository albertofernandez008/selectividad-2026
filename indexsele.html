<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0a0f;
  --surface:#0f0f1a;
  --surface2:#161624;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#ffffff;
  --text2:rgba(255,255,255,0.55);
  --text3:rgba(255,255,255,0.28);
  --accent:#6c63ff;
  --accent2:#a78bfa;
  --fis:#378ADD;
  --fil:#7F77DD;
  --tec:#1D9E75;
  --mat:#E24B4A;
  --len:#EF9F27;
  --ing:#639922;
  --des:#5F5E5A;
}

html,body{
  height:100%;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  overflow:hidden;
}

/* PWA full-screen shell */
.shell{
  height:100dvh;
  max-width:430px;
  margin:0 auto;
  background:var(--surface);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Status bar spacer for notch devices */
.status-bar{
  padding:env(safe-area-inset-top,14px) 24px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  font-weight:500;
  color:var(--text2);
  min-height:44px;
  flex-shrink:0;
}

/* Header */
.app-header{
  padding:10px 24px 0;
  flex-shrink:0;
}

.header-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:3px;
}

.app-title{
  font-family:'Syne',sans-serif;
  font-size:24px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-0.5px;
  line-height:1.1;
}

.days-badge{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:14px;
  padding:6px 14px;
  text-align:center;
  line-height:1.15;
}
.days-badge .num{
  display:block;
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:800;
  color:#fff;
}
.days-badge .lbl{
  font-size:10px;
  font-weight:500;
  color:rgba(255,255,255,0.75);
}

.app-subtitle{
  font-size:12px;
  color:var(--text3);
  margin-bottom:14px;
}

/* Day selector */
.day-scroller{
  display:flex;
  gap:7px;
  padding:0 24px;
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
  margin-bottom:2px;
}
.day-scroller::-webkit-scrollbar{display:none}

.day-btn{
  flex-shrink:0;
  min-width:50px;
  padding:8px 12px;
  border-radius:18px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  text-align:center;
  transition:all .18s ease;
  -webkit-appearance:none;
}
.day-btn.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:transparent;
}
.day-btn .d-num{
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:700;
  color:var(--text);
  display:block;
}
.day-btn .d-lbl{
  font-size:10px;
  color:var(--text3);
  display:block;
  margin-top:1px;
}
.day-btn.active .d-lbl{color:rgba(255,255,255,0.75);}

/* Progress */
.progress-wrap{
  padding:10px 24px 0;
  flex-shrink:0;
}
.progress-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}
.progress-meta span{
  font-size:11px;
  color:var(--text3);
}
.progress-meta .pct{
  font-weight:600;
  color:var(--accent2);
}
.progress-track{
  height:3px;
  background:rgba(255,255,255,0.06);
  border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .4s ease;
}

/* Day heading */
.day-heading{
  padding:12px 24px 4px;
  display:flex;
  align-items:baseline;
  gap:10px;
  flex-shrink:0;
}
.day-heading h2{
  font-family:'Syne',sans-serif;
  font-size:17px;
  font-weight:700;
  color:var(--text);
}
.day-heading span{
  font-size:12px;
  color:var(--text3);
}

/* Sessions list */
.sessions{
  flex:1;
  overflow-y:auto;
  padding:0 16px;
  padding-bottom:calc(env(safe-area-inset-bottom,20px) + 72px);
  -webkit-overflow-scrolling:touch;
}
.sessions::-webkit-scrollbar{display:none}
.sessions{scrollbar-width:none}

.session-card{
  background:rgba(255,255,255,0.035);
  border:1px solid var(--border);
  border-radius:18px;
  margin-bottom:9px;
  padding:13px 14px;
  display:flex;
  gap:12px;
  align-items:flex-start;
  cursor:pointer;
  transition:background .15s,opacity .2s;
  position:relative;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}
.session-card:active{background:rgba(255,255,255,0.07);}
.session-card.done{opacity:0.38;}
.session-card.done .s-name{text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.3);}

.session-card::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  border-radius:3px 0 0 3px;
}

.time-col{
  text-align:center;
  min-width:44px;
}
.t-start{font-size:12px;font-weight:500;color:var(--text);}
.t-end{font-size:10px;color:var(--text3);}
.t-dur{
  font-size:10px;font-weight:600;
  margin-top:4px;
  padding:2px 5px;
  border-radius:7px;
  background:rgba(255,255,255,0.06);
  color:var(--text3);
  display:inline-block;
}

.info-col{flex:1;min-width:0;}
.s-subj{
  font-size:10px;font-weight:600;
  letter-spacing:.07em;
  text-transform:uppercase;
  margin-bottom:2px;
}
.s-name{
  font-size:13px;font-weight:500;
  color:var(--text);
  line-height:1.35;
  margin-bottom:5px;
}
.s-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{
  font-size:10px;padding:2px 6px;
  border-radius:7px;
  background:rgba(255,255,255,0.06);
  color:var(--text3);
}

.check{
  width:24px;height:24px;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.14);
  background:transparent;
  flex-shrink:0;
  margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:transparent;
  transition:all .2s;
  pointer-events:none;
}
.session-card.done .check{
  background:rgba(108,99,255,0.25);
  border-color:var(--accent);
  color:var(--accent2);
}

/* Break row */
.break-row{
  display:flex;align-items:center;gap:10px;
  padding:4px 2px;margin-bottom:9px;
}
.break-line{flex:1;height:1px;background:rgba(255,255,255,0.04);}
.break-txt{font-size:10px;color:var(--text3);white-space:nowrap;}

/* Bottom nav */
.bottom-nav{
  position:absolute;
  bottom:0;left:0;right:0;
  background:rgba(15,15,26,0.96);
  border-top:1px solid var(--border);
  padding:10px 0;
  padding-bottom:calc(env(safe-area-inset-bottom,10px) + 10px);
  display:flex;
  justify-content:space-around;
  flex-shrink:0;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.nav-it{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:0 14px;
}
.nav-ic{font-size:20px;line-height:1;}
.nav-lb{font-size:10px;color:var(--text3);}
.nav-it.active .nav-lb{color:var(--accent2);}

/* Subject colors */
.s-fis::before{background:var(--fis);}
.s-fis .s-subj{color:var(--fis);}
.s-fil::before{background:var(--fil);}
.s-fil .s-subj{color:var(--fil);}
.s-tec::before{background:var(--tec);}
.s-tec .s-subj{color:var(--tec);}
.s-mat::before{background:var(--mat);}
.s-mat .s-subj{color:var(--mat);}
.s-len::before{background:var(--len);}
.s-len .s-subj{color:var(--len);}
.s-ing::before{background:var(--ing);}
.s-ing .s-subj{color:var(--ing);}
.s-des::before{background:var(--des);}
.s-des .s-subj{color:var(--des);}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.session-card,.break-row{animation:fadeIn .22s ease both;}
</style>
</head>

    {t:'11:30',e:'12:30',c:'mat',n:'Fórmulas y casos tipo',g:['Sin exámenes nuevos']},
    {t:'12:30',e:'13:00',c:'len',n:'Ortografía y vocabulario final',g:['Tildes']},
    {t:'13:00',e:'16:00',b:'Comida tranquila'},
    {t:'16:00',e:'17:00',c:'des',n:'Preparar material para mañana',g:['Bolígrafos','DNI','Calculadora']},
    {t:'21:00',e:'22:30',b:'Dormir pronto — mañana es el día 🌙'},
  ]},
];

const SUBJ = {fis:'Física',fil:'Filosofía',tec:'Tecnología',mat:'Matemáticas',len:'Lengua',ing:'Inglés',des:'Logística'};
const DAY_NAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom','Lun','Mar','Mié','Jue','Vie'];

// Persist done state
let done = JSON.parse(localStorage.getItem('sel26_done')||'{}');
let currentDay = parseInt(localStorage.getItem('sel26_day')||'0');

function saveDone(){localStorage.setItem('sel26_done',JSON.stringify(done));}
function saveDay(){localStorage.setItem('sel26_day',String(currentDay));}

function getDur(s,e){
  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);
  const m=(eh*60+em)-(sh*60+sm);
  if(m<=0) return '';
  if(m<60) return m+'m';
  const h=Math.floor(m/60),r=m%60;
  return r?h+'h'+r+'m':h+'h';
}

function buildDayScroller(){
  const el=document.getElementById('day-scroller');
  el.innerHTML=DAY_NAMES.map((l,i)=>`
    <button class="day-btn${i===currentDay?' active':''}" onclick="selectDay(${i})" aria-label="Día ${i+1}">
      <span class="d-num">${i+1}</span>
      <span class="d-lbl">${l}</span>
    </button>`).join('');
  // scroll active into view
  setTimeout(()=>{
    const active=el.querySelector('.active');
    if(active) active.scrollIntoView({inline:'center',behavior:'smooth'});
  },50);
}

function selectDay(d){
  currentDay=d;
  saveDay();
  document.getElementById('days-left').textContent=Math.max(0,12-d);
  buildDayScroller();
  buildSessions();
  updateProgress();
}

function buildSessions(){
  const day=DAYS[currentDay];
  document.getElementById('d-title').textContent='Día '+(currentDay+1);
  document.getElementById('d-sub').textContent=day.sub;
  const key='d'+currentDay;
  const doneMap=done[key]||{};
  const el=document.getElementById('sessions');
  el.innerHTML=day.s.map((s,i)=>{
    if(s.b!==undefined){
      return `<div class="break-row" style="animation-delay:${i*0.04}s"><div class="break-line"></div><div class="break-txt">${s.b}</div><div class="break-line"></div></div>`;
    }
    const isDone=!!doneMap[i];
    return `<div class="session-card s-${s.c}${isDone?' done':''}" onclick="toggleDone(${i})" style="animation-delay:${i*0.04}s" role="button" tabindex="0" aria-label="${SUBJ[s.c]}: ${s.n}">
      <div class="time-col">
        <div class="t-start">${s.t}</div>
        <div class="t-end">${s.e}</div>
        <div class="t-dur">${getDur(s.t,s.e)}</div>
      </div>
      <div class="info-col">
        <div class="s-subj">${SUBJ[s.c]}</div>
        <div class="s-name">${s.n}</div>
        <div class="s-tags">${(s.g||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="check">${isDone?'✓':''}</div>
    </div>`;
  }).join('');
}

function toggleDone(i){
  const s=DAYS[currentDay].s[i];
  if(!s||s.b!==undefined) return;
  const key='d'+currentDay;
  if(!done[key]) done[key]={};
  done[key][i]=!done[key][i];
  saveDone();
  buildSessions();
  updateProgress();
}

function updateProgress(){
  const key='d'+currentDay;
  const doneMap=done[key]||{};
  const total=DAYS[currentDay].s.filter(s=>s.b===undefined).length;
  const count=Object.values(doneMap).filter(Boolean).length;
  const pct=total?Math.round(count/total*100):0;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';
}

function updateClock(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  document.getElementById('clock').textContent=h+':'+(m<10?'0'+m:m);
}

updateClock();
setInterval(updateClock,30000);
buildDayScroller();
buildSessions();
updateProgress();
</script>
</body>
</html>
